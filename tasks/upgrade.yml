# code: language=ansible
---
- name: Update repositories file
  become: true
  ansible.builtin.replace:
    regexp: v\d+\.\d+
    path: /etc/apk/repositories
    replace: "v{{ alpine_distro_version_desired }}"

- name: Update apk-tools
  become: true
  community.general.apk:
    update_cache: true
    name:
      - apk-tools
    state: latest

- name: Update installed packages
  become: true
  register: alpine_package_upgrade
  community.general.apk:
    update_cache: true
    upgrade: true
    available: true

- name: Sync services # noqa: no-changed-when no-handler
  become: true
  when: alpine_package_upgrade.changed
  ansible.builtin.command:
    cmd: sync

- name: Reboot system # noqa: no-handler
  become: true
  when: alpine_package_upgrade.changed
  ansible.builtin.reboot:
