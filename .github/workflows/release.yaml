name: create-release

on:
  workflow_dispatch:
    inputs:
      version:
        type: string
        default: "auto"
        required: false
        description: "Used to manually set the version"

jobs:
  release:
    uses: wittdennis/pipelines/.github/workflows/cog-release.yaml@4ce660afc0b610b34a0710d4fe5ac94c10748b90 # 2.0.34
    with:
      version: ${{ inputs.version }}
    secrets:
      release-token: ${{ secrets.RELEASE_TOKEN}}
